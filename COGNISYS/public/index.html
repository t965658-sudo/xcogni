<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CognisysAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Inter',-apple-system,system-ui,sans-serif}
[data-theme="light"]{--bg:#fff;--bg-secondary:#f9f9f9;--bg-tertiary:#f0f0f0;--text:#0d0d0d;--text-secondary:#6b6b6b;--text-tertiary:#9a9a9a;--border:#e5e5e5;--border-light:#f0f0f0;--hover:#f5f5f5;--active:#ebebeb;--accent:#5c4cf6;--accent-hover:#4a3ce8;--user-bubble:#5c4cf6;--user-text:#fff;--assistant-bubble:#f2f2f7;--assistant-text:#0d0d0d;--shadow:0 1px 6px rgba(0,0,0,0.05);--shadow-lg:0 8px 24px rgba(0,0,0,0.1);--overlay:rgba(0,0,0,0.4)}
[data-theme="dark"]{--bg:#212121;--bg-secondary:#171717;--bg-tertiary:#2f2f2f;--text:#ececec;--text-secondary:#b4b4b4;--text-tertiary:#777;--border:rgba(255,255,255,0.1);--border-light:rgba(255,255,255,0.05);--hover:rgba(255,255,255,0.1);--active:rgba(255,255,255,0.12);--accent:#10a37f;--accent-hover:#0d8c6c;--user-bubble:#10a37f;--user-text:#fff;--assistant-bubble:#2f2f2f;--assistant-text:#ececec;--shadow:0 1px 6px rgba(0,0,0,0.2);--shadow-lg:0 8px 24px rgba(0,0,0,0.3);--overlay:rgba(0,0,0,0.6)}

html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;height:100vh;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;transition:width 0.2s,min-width 0.2s}
.sidebar.collapsed{width:0;min-width:0;overflow:hidden}
.sidebar-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.sidebar-logo svg{width:18px;height:18px}
.new-chat-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;margin:8px 10px;border-radius:8px;border:none;background:var(--bg-tertiary);color:var(--text);font-size:13px;font-weight:500;transition:background 0.15s}
.new-chat-btn:hover{background:var(--accent);color:#fff}
.conversation-list{flex:1;overflow-y:auto;padding:4px 8px}
.conv-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:2px;transition:background 0.1s;position:relative}
.conv-item:hover{background:var(--hover);color:var(--text)}
.conv-item.active{background:var(--active);color:var(--text)}
.conv-item .conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .conv-delete{opacity:0;position:absolute;right:6px;padding:4px;border-radius:4px;border:none;background:none;color:var(--text-tertiary);cursor:pointer}
.conv-item:hover .conv-delete{opacity:1}
.conv-item .conv-delete:hover{background:var(--hover);color:var(--text)}
.conv-item .conv-rename{opacity:0;position:absolute;right:38px;padding:4px;border-radius:4px;border:none;background:none;color:var(--text-tertiary);cursor:pointer}
.conv-item:hover .conv-rename{opacity:1}
.conv-item .conv-rename:hover{background:var(--hover);color:var(--text)}
.sidebar-user{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;position:relative}
.sidebar-user:hover{background:var(--hover)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-plan{font-size:11px;color:var(--text-tertiary)}
.user-menu{position:absolute;bottom:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px 0;display:none;z-index:50}
.user-menu.open{display:block}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background 0.1s}
.menu-item:hover{background:var(--hover)}
.menu-item.danger{color:#e53e3e}
.menu-item svg{width:16px;height:16px;flex-shrink:0;color:var(--text-secondary)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.topbar{display:flex;align-items:center;justify-content:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:10}
.topbar-left{position:absolute;left:12px;display:flex;gap:4px}
.topbar-title{font-size:14px;font-weight:600;color:var(--text-secondary)}
.toggle-sidebar{padding:6px;border-radius:6px;border:none;background:none;color:var(--text-secondary);cursor:pointer}
.toggle-sidebar:hover{background:var(--hover);color:var(--text)}
.toggle-sidebar svg{width:18px;height:18px}
.theme-btn{position:absolute;right:12px;padding:6px;border-radius:6px;border:none;background:none;color:var(--text-secondary);cursor:pointer}
.theme-btn:hover{background:var(--hover);color:var(--text)}
.messages{flex:1;overflow-y:auto;padding:0;scroll-behavior:smooth}
.messages-inner{max-width:768px;margin:0 auto;padding:24px 24px 140px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px}
.empty-state h1{font-size:28px;font-weight:600;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;color:var(--text-secondary);margin-bottom:32px}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;width:100%}
.suggestion-btn{padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--text);font-size:13px;text-align:left;cursor:pointer;transition:background 0.15s;line-height:1.4}
.suggestion-btn:hover{background:var(--hover)}
.msg-group{margin-bottom:24px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:12px;max-width:85%;margin-bottom:8px}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg.assistant{margin-right:auto}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg.user .msg-avatar{background:var(--user-bubble);color:var(--user-text)}
.msg.assistant .msg-avatar{background:var(--accent);color:#fff}
.msg-content{padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.65;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap}
.msg.user .msg-content{background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:4px}
.msg.assistant .msg-content{background:var(--assistant-bubble);color:var(--assistant-text);border-bottom-left-radius:4px}
.msg-actions{display:flex;gap:2px;margin-top:6px;margin-left:42px;opacity:0;transition:opacity 0.15s}
.msg-group:hover .msg-actions{opacity:1}
.msg-action-btn{padding:4px;border-radius:4px;border:none;background:none;color:var(--text-tertiary);cursor:pointer}
.msg-action-btn:hover{background:var(--hover);color:var(--text)}
.msg-action-btn svg{width:16px;height:16px;display:block}
.msg.user .msg-content p{margin-bottom:4px}
.msg.user .msg-content p:last-child{margin-bottom:0}
.msg-content h1,.msg-content h2,.msg-content h3{margin:12px 0 6px;font-weight:600}
.msg-content h1{font-size:18px}.msg-content h2{font-size:16px}.msg-content h3{font-size:15px}
.msg-content p{margin-bottom:8px}.msg-content p:last-child{margin-bottom:0}
.msg-content ul,.msg-content ol{padding-left:20px;margin-bottom:8px}
.msg-content li{margin-bottom:4px}
.msg-content strong{font-weight:600}.msg-content em{font-style:italic}
.msg-content blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--text-secondary);background:var(--hover);border-radius:4px}
.msg-content code{background:rgba(0,0,0,0.08);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Fira Code',monospace}
.msg-content pre{position:relative;margin:10px 0;border-radius:10px;overflow:hidden;background:#0d0d0d !important}
.msg-content pre code{background:none;padding:14px 16px;font-size:13px;line-height:1.5;overflow-x:auto;display:block;color:#e4e4e7 !important}
.copy-code-btn{position:absolute;top:8px;right:8px;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:11px;cursor:pointer;opacity:0;transition:opacity 0.15s}
.msg-content pre:hover .copy-code-btn{opacity:1}
.copy-code-btn:hover{background:rgba(255,255,255,0.2);color:#fff}
.msg-content table{border-collapse:collapse;margin:10px 0;width:100%;font-size:14px}
.msg-content th,.msg-content td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.msg-content th{background:var(--hover);font-weight:600}
.msg-content a{color:var(--accent);text-decoration:underline}
.msg-content hr{margin:12px 0;border:none;border-top:1px solid var(--border)}
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);animation:typing 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.3;transform:scale(0.8)}30%{opacity:1;transform:scale(1)}}
.input-area{padding:0 16px 16px;position:relative;background:var(--bg)}
.input-area::before{content:'';position:absolute;bottom:100%;left:0;right:0;height:32px;background:linear-gradient(transparent,var(--bg));pointer-events:none}
.input-wrapper{max-width:768px;margin:0 auto;border:1px solid var(--border);border-radius:16px;background:var(--bg);padding:8px 12px;display:flex;align-items:flex-end;gap:8px;box-shadow:var(--shadow);transition:border-color 0.15s,box-shadow 0.15s}
.input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(92,76,246,0.15)}
.input-wrapper textarea{flex:1;border:none;outline:none;background:none;resize:none;font-size:15px;line-height:1.5;max-height:200px;padding:4px 0;color:var(--text)}
.input-wrapper textarea::placeholder{color:var(--text-tertiary)}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,opacity 0.15s}
.send-btn:hover{background:var(--accent-hover)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;background:var(--text);color:var(--bg);font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;z-index:40;width:280px}
.sidebar.overlay{box-shadow:var(--shadow-lg)}
.sidebar.collapsed{transform:translateX(-100%);width:280px;min-width:280px}
.sidebar.collapsed.overlay{transform:translateX(0)}
.suggestions{grid-template-columns:1fr}
.msg{max-width:95%}
.empty-state h1{font-size:22px}
}
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
const state = { user: null, conversations: [], activeId: null, messages: [], sidebarOpen: true, sending: false, theme: localStorage.getItem('cognisys_theme') || 'light', token: null, mobileSidebar: false, searchQuery: '', regeneratingId: null };

async function api(path, options = {}) {
  const token = state.token || localStorage.getItem('cognisys_access_token');
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, { ...options, headers });
  if (res.status === 401) { logout(); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function login(email) {
  const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ email: email || `guest_${Date.now()}@cognisys.ai` }) });
  if (!data) return;
  state.token = data.access_token;
  localStorage.setItem('cognisys_access_token', data.access_token);
  state.user = data.user;
  renderApp();
  loadConversations();
}

function logout() {
  state.token = null; state.user = null; state.conversations = []; state.messages = [];
  localStorage.removeItem('cognisys_access_token');
  fetch('/api/logout', { method: 'POST' }).catch(() => {});
  renderApp();
}

// Sanitized markdown with DOMPurify - prevents XSS from AI-generated content
function renderMarkdown(text) {
  if (!text) return '';
  const html = marked.parse(text, { breaks: true, gfm: true });
  return DOMPurify.sanitize(html, {
    ALLOWED_TAGS: [
      'h1','h2','h3','h4','h5','h6','p','br','hr',
      'ul','ol','li',
      'table','thead','tbody','tr','th','td',
      'blockquote','pre','code','strong','em',
      'a','img','span','div',
      'dl','dt','dd',
      'abbr','acronym','b','i','strike','sub','sup',
      'tt','var','del','ins','q'
    ],
    ALLOWED_ATTR: ['href','target','rel','class','id','src','alt','title'],
    ALLOW_DATA_ATTR: false,
    FORBID_TAGS: ['script','iframe','object','embed','form','input','textarea','select','button','style'],
    FORBID_ATTR: ['onerror','onload','onclick','onmouseover','onmouseout','onfocus','onblur','onsubmit','onchange','onkeydown','onkeyup','style'],
    ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto|ftp):|[^a-z]|[a-z+.-]+(?:[^a-z+.-:]|$))/i
  });
}

function renderMessageContent(text, container) {
  if (!text) return '';
  const html = renderMarkdown(text);
  const div = document.createElement('div');
  div.innerHTML = html;
  
  // Render into actual DOM first, then highlight and add copy buttons
  requestAnimationFrame(() => {
    div.querySelectorAll('pre code').forEach(block => {
      try { hljs.highlightElement(block); } catch(e) {}
      const pre = block.parentElement;
      if (pre && !pre.querySelector('.copy-code-btn')) {
        const btn = document.createElement('button');
        btn.className = 'copy-code-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => { navigator.clipboard.writeText(block.textContent); btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); };
        pre.appendChild(btn);
      }
    });
  });
  div.querySelectorAll('a').forEach(a => { if (!a.target) a.target = '_blank'; if (!a.rel) a.rel = 'noopener'; });
  return div.innerHTML;
}

async function loadConversations() { try { const d = await api('/api/conversations'); if (d) { state.conversations = d; renderSidebar(); } } catch(e) {} }
async function loadConversation(id) { try { const d = await api('/api/conversations/' + id); if (d) { state.activeId = id; state.messages = d.messages || []; renderMessages(); renderSidebar(); renderTopbar(); } } catch(e) {} }
async function deleteConversation(id) { try { await api('/api/conversations/' + id, { method: 'DELETE' }); if (state.activeId == id) { state.activeId = null; state.messages = []; renderMessages(); } loadConversations(); } catch(e) {} }
async function renameConversation(id, title) { try { await api('/api/conversations/' + id, { method: 'PUT', body: JSON.stringify({ title }) }); loadConversations(); } catch(e) {} }

function filterConversations(query) {
  state.searchQuery = query.toLowerCase();
  renderSidebar();
}

function getFilteredConversations() {
  if (!state.searchQuery) return state.conversations;
  return state.conversations.filter(c => (c.title || '').toLowerCase().includes(state.searchQuery));
}

// Global abort controller for current stream
let currentStreamController = null;

async function sendMessage() {
  const textarea = document.getElementById('msg-input');
  if (!textarea) return;
  const message = textarea.value.trim();
  if (!message || state.sending) return;
  textarea.value = '';
  autoResize(textarea);
  state.sending = true;
  
  // Create AbortController for this request
  currentStreamController = new AbortController();
  
  // Keep user message visible - don't use optimistic flag that gets removed
  const userMsgId = Date.now();
  const assistantMsgId = Date.now() + 1;
  state.messages.push({ id: userMsgId, role: 'user', content: message });
  state.messages.push({ id: assistantMsgId, role: 'assistant', content: '', streaming: true });
  renderMessages();
  scrollToBottom();
  
  try {
    // Use streaming endpoint
    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.token || localStorage.getItem('cognisys_access_token')}`
      },
      body: JSON.stringify({ message, conversation_id: state.activeId }),
      signal: currentStreamController.signal
    });
    
    if (!response.ok) {
      throw new Error('Stream request failed');
    }
    
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalData = null;
    
    // Update streaming message with partial content
    const updateStreamingMessage = (content) => {
      const streamingMsg = state.messages.find(m => m.streaming);
      if (streamingMsg) {
        streamingMsg.content = content;
      }
    };
    
    let accumulatedContent = '';
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // Keep incomplete line
      
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            
            if (data.type === 'token') {
              accumulatedContent += data.token;
              updateStreamingMessage(accumulatedContent);
              renderMessages();
              scrollToBottom();
            } else if (data.type === 'done') {
              finalData = data;
            } else if (data.type === 'error') {
              throw new Error(data.error);
            }
          } catch (e) {
            // Skip malformed JSON
          }
        }
      }
    }
    
    // Finalize message - use real IDs from backend
    state.messages = state.messages.filter(m => !m.streaming);
    if (finalData) {
      // Update the existing user message with real ID if provided
      const userMsg = state.messages.find(m => m.id === userMsgId);
      if (userMsg && finalData.message_id) {
        userMsg.message_id = finalData.user_message_id || userMsg.id;
      }
      // Update assistant message with real ID from backend
      const assistantMsg = state.messages.find(m => m.id === assistantMsgId);
      if (assistantMsg) {
        assistantMsg.id = finalData.message_id || assistantMsg.id;
        assistantMsg.content = finalData.reply;
        assistantMsg.conversation_id = finalData.conversation_id;
      }
      state.activeId = finalData.conversation_id;
      loadConversations();
    } else {
      // No finalData - keep accumulated content for stopped generation
      const assistantMsg = state.messages.find(m => m.id === assistantMsgId);
      if (assistantMsg) {
        assistantMsg.content = accumulatedContent;
        assistantMsg.streaming = false;
      }
    }
    renderMessages();
    scrollToBottom();
    
  } catch(e) {
    if (e.name === 'AbortError') {
      // User stopped generation - keep partial content, don't duplicate user message
      const assistantMsg = state.messages.find(m => m.id === assistantMsgId);
      if (assistantMsg) {
        assistantMsg.streaming = false;
        if (!assistantMsg.content) {
          assistantMsg.content = 'Generation stopped.';
        }
      }
    } else {
      // Remove streaming placeholder on error
      state.messages = state.messages.filter(m => !m.streaming);
      state.messages.push({ id: Date.now() + 4, role: 'assistant', content: 'Sorry, I encountered an error. Please try again.' });
    }
    renderMessages();
  } finally {
    state.sending = false;
    currentStreamController = null;
  }
}

function stopGeneration() {
  if (currentStreamController) {
    currentStreamController.abort();
    currentStreamController = null;
  }
}

function scrollToBottom() { const el = document.getElementById('messages'); if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 50); }
function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px'; }

function newConversation() {
  state.activeId = null; state.messages = []; renderMessages(); renderSidebar();
  document.getElementById('msg-input')?.focus();
}

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  localStorage.setItem('cognisys_theme', state.theme);
  renderTopbar();
}

function renderApp() { if (!state.token) renderLogin(); else renderChat(); }

function renderLogin() {
  document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,#f0f4ff 0%,#fafafa 60%,#f5f0ff 100%)">
    <div style="background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.06)">
      <div style="display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;justify-content:center;margin-bottom:32px"><svg width="28" height="28" viewBox="0 0 24 24" fill="#5c4cf6"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>CognisysAI</div>
      <h1 style="font-size:24px;font-weight:600;text-align:center;margin-bottom:24px;color:#0d0d0d">Welcome back</h1>
      <input id="login-email" type="email" placeholder="Enter your email" style="width:100%;padding:11px 16px;border:1px solid #e0e0e0;border-radius:50px;font-size:14px;outline:none;margin-bottom:12px" onkeydown="if(event.key==='Enter')document.getElementById('login-btn').click()">
      <button id="login-btn" onclick="login(document.getElementById('login-email').value)" style="width:100%;padding:12px;background:#0d0d0d;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer">Continue</button>
      <div style="display:flex;align-items:center;gap:12px;margin:16px 0;color:#aaa;font-size:13px"><div style="flex:1;height:1px;background:#e8e8e8"></div>OR<div style="flex:1;height:1px;background:#e8e8e8"></div></div>
      <button onclick="login()" style="width:100%;padding:11px;border:1px solid #e0e0e0;border-radius:50px;background:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">Try it first — no account needed</button>
      <div id="login-error" style="color:#e53e3e;font-size:13px;text-align:center;margin-top:12px;display:none"></div>
    </div></div>`;
  document.getElementById('login-email')?.focus();
}

function renderChat() {
  document.getElementById('app').innerHTML = `<div class="sidebar" id="sidebar"><div class="sidebar-header"><div class="sidebar-logo"><svg viewBox="0 0 24 24" fill="#5c4cf6"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>CognisysAI</div></div>
    <button class="new-chat-btn" onclick="newConversation()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New conversation</button>
    <div style="padding:8px 10px;"><input type="text" placeholder="Search conversations..." value="${state.searchQuery}" oninput="filterConversations(this.value)" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-tertiary);color:var(--text);font-size:13px;outline:none" /></div>
    <div class="conversation-list" id="conv-list"></div>
    <div class="sidebar-user" onclick="toggleUserMenu()">
      <div class="user-avatar">${state.user?.name?.substring(0,2).toUpperCase() || 'GU'}</div>
      <div class="user-info"><div class="user-name">${state.user?.name || 'Guest'}</div><div class="user-plan">${state.user?.plan || 'Free'}</div></div>
      <div class="user-menu" id="user-menu">
        <div class="menu-item" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>${state.theme === 'dark' ? 'Light mode' : 'Dark mode'}</div>
        <div class="menu-item danger" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log out</div>
      </div>
    </div></div>
    <div class="main"><div class="topbar" id="topbar"></div><div class="messages" id="messages"><div class="messages-inner" id="messages-inner"></div></div>
    <div class="input-area"><div class="input-wrapper"><textarea id="msg-input" rows="1" placeholder="Message CognisysAI" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault(); editingMessageId ? submitEditMessage() : sendMessage();}" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" ${state.sending || editingMessageId ? 'disabled' : ''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      <button class="send-btn" id="stop-btn" onclick="stopGeneration()" style="display:${state.sending ? 'flex' : 'none'};background:#e53e3e"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg></button>
    </div></div></div></div>`;
  renderSidebar(); renderTopbar(); renderMessages();
  if (state.mobileSidebar) document.getElementById('sidebar').classList.add('overlay', 'collapsed');
  document.getElementById('msg-input')?.focus();
}

function renderSidebar() {
  const list = document.getElementById('conv-list'); if (!list) return;
  const filtered = getFilteredConversations();
  if (!filtered.length) { list.innerHTML = '<div style="padding:16px 10px;font-size:13px;color:var(--text-tertiary);text-align:center">' + (state.searchQuery ? 'No matching conversations' : 'No conversations yet') + '</div>'; return; }
  list.innerHTML = filtered.map(c => `<div class="conv-item ${c.id == state.activeId ? 'active' : ''}" onclick="loadConversation(${c.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="conv-title" title="Double-click to rename" ondblclick="renamePrompt(${c.id})">${c.title || 'New conversation'}</span><button class="conv-rename" onclick="event.stopPropagation();renamePrompt(${c.id})" title="Rename"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="conv-delete" onclick="event.stopPropagation();deleteConversation(${c.id})" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>`).join('');
}

function renderTopbar() {
  const bar = document.getElementById('topbar'); if (!bar) return;
  bar.innerHTML = `<div class="topbar-left"><button class="toggle-sidebar" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button></div>
    <div class="topbar-title">${state.activeId ? (state.conversations.find(c => c.id == state.activeId)?.title || 'Chat') : 'CognisysAI'}</div>
    <button class="theme-btn" onclick="toggleTheme()">${state.theme === 'dark' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}</button>`;
}

function renderMessages() {
  const container = document.getElementById('messages-inner'); if (!container) return;
  if (!state.messages.length) {
    container.innerHTML = `<div class="empty-state"><h1>How can I help you today?</h1><p>Ask me anything — I'm here to assist</p><div class="suggestions">
      ${['Explain quantum computing in simple terms','Write a Python function to sort a list','What are the best practices for React?','Help me debug this JavaScript error'].map(s => `<button class="suggestion-btn" onclick="quickPrompt('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}
    </div></div>`; return;
  }
  container.innerHTML = state.messages.map(m => {
    if (m.streaming) return `<div class="msg-group"><div class="msg assistant"><div class="msg-avatar">C</div><div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div></div></div>`;
    const content = renderMessageContent(m.content);
    let actions = '';
    if (m.role === 'assistant') {
      actions = `<div class="msg-actions"><button class="msg-action-btn" onclick="copyMessage(${m.id})" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><button class="msg-action-btn" onclick="regenerateMessage(${m.id})" title="Regenerate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button></div>`;
    } else if (m.role === 'user') {
      actions = `<div class="msg-actions"><button class="msg-action-btn" onclick="editMessage(${m.id})" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div>`;
    }
    return `<div class="msg-group" data-msg-id="${m.id}"><div class="msg ${m.role}"><div class="msg-avatar">${m.role === 'user' ? 'U' : 'C'}</div><div class="msg-content">${content}</div></div>${actions}</div>`;
  }).join('');
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 768) { state.mobileSidebar = !state.mobileSidebar; sidebar.classList.toggle('overlay'); sidebar.classList.toggle('collapsed'); }
  else sidebar.classList.toggle('collapsed');
}

function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('open'); }
document.addEventListener('click', (e) => { const m = document.getElementById('user-menu'); if (m && !e.target.closest('.sidebar-user')) m.classList.remove('open'); });

function quickPrompt(text) { document.getElementById('msg-input').value = text; sendMessage(); }
async function copyMessage(id) { const m = state.messages.find(m => m.id == id); if (m) { await navigator.clipboard.writeText(m.content); showToast('Copied to clipboard'); } }
async function regenerateMessage(id) { try { const d = await api('/api/messages/' + id + '/regenerate', { method: 'POST' }); if (d) { state.messages = state.messages.map(m => m.id == id ? { ...m, content: d.reply } : m); renderMessages(); showToast('Response regenerated'); } } catch(e) { showToast('Failed to regenerate'); } }

// Edit user message - load into textarea and submit
let editingMessageId = null;
function editMessage(id) {
  const m = state.messages.find(m => m.id == id);
  if (!m || m.role !== 'user') return;
  editingMessageId = id;
  const textarea = document.getElementById('msg-input');
  textarea.value = m.content;
  textarea.focus();
  autoResize(textarea);
}

async function submitEditMessage() {
  if (!editingMessageId) return;
  const textarea = document.getElementById('msg-input');
  const content = textarea.value.trim();
  if (!content) return;
  
  try {
    const data = await api('/api/messages/' + editingMessageId + '/edit', { 
      method: 'POST', 
      body: JSON.stringify({ content }) 
    });
    if (data) {
      // Find the index of the edited message
      const editIndex = state.messages.findIndex(m => m.id == editingMessageId);
      // Update the edited user message
      state.messages[editIndex] = { ...state.messages[editIndex], content };
      // Remove all messages after the edited one
      state.messages = state.messages.slice(0, editIndex + 1);
      // Add the new assistant response
      state.messages.push({ 
        id: Date.now(), 
        role: 'assistant', 
        content: data.reply,
        conversation_id: data.conversation_id,
        message_id: data.message_id
      });
      // Update conversation ID if provided
      if (data.conversation_id) {
        state.activeId = data.conversation_id;
        loadConversations();
      }
      editingMessageId = null;
      textarea.value = '';
      autoResize(textarea);
      renderMessages();
      scrollToBottom();
    }
  } catch(e) {
    showToast('Failed to edit message');
    editingMessageId = null;
  }
}

function renamePrompt(id) { const c = state.conversations.find(c => c.id == id); if (!c) return; const t = prompt('Rename conversation:', c.title); if (t && t.trim()) renameConversation(id, t.trim()); }

function showToast(message) {
  let toast = document.getElementById('toast');
  if (!toast) { toast = document.createElement('div'); toast.id = 'toast'; toast.className = 'toast'; document.body.appendChild(toast); }
  toast.textContent = message; toast.classList.add('show');
  clearTimeout(toast._timeout); toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', () => {
  document.documentElement.setAttribute('data-theme', state.theme);
  const token = localStorage.getItem('cognisys_access_token');
  if (token) {
    state.token = token;
    try { const p = JSON.parse(atob(token.split('.')[1])); state.user = { id: p.sub, name: p.name || 'User', email: p.email, plan: 'Free' }; } catch(e) { state.user = { name: 'User', plan: 'Free' }; }
    renderApp(); loadConversations();
  } else { renderApp(); }
});
</script>
